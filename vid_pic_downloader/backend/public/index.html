<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vid pic downloader</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="top-bar flex justify-center align-center">
      <h2 class="app-title">Vid pic downloader</h2>
    </div>
    <div class="body-section flex-column justify-center align-center">
      <div class="text-input-section">
        <label class="text-input-label">Enter URL:</label>
        <input type="text" id="url-text-input" />
      </div>
      <div class="button-section">
        <input
          type="button"
          class="page-button"
          id="yt-download-button"
          value="YT-Download"
        />
        <input
          type="button"
          class="page-button"
          id="gallery-dlp-button"
          value="Gallery-DL"
        />
      </div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
